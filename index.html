<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简简单单 · 三两日天气</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #b8d8f0 0%, #d4eaf7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .weather-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 42px;
            box-shadow: 0 25px 40px -10px rgba(0, 30, 50, 0.25), inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.2s ease;
        }

        /* 顶部城市 / 搜索条 (静态装饰) */
        .city-search {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
        }

        .city-name {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 1.6rem;
            font-weight: 500;
            color: #113946;
            letter-spacing: -0.01em;
        }

        .city-name span {
            font-size: 1.9rem;
            line-height: 1;
        }

        .search-placeholder {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            padding: 0.5rem 0.9rem 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #2c5775;
            font-weight: 400;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .search-placeholder::after {
            content: "🔍";
            font-size: 1rem;
            opacity: 0.7;
        }

        /* 今日大天气 */
        .today-weather {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 34px;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 6px 12px rgba(53, 94, 119, 0.1);
        }

        .temp-now {
            display: flex;
            flex-direction: column;
        }

        .temp-big {
            font-size: 4.2rem;
            font-weight: 300;
            line-height: 1;
            color: #0a2938;
            letter-spacing: -2px;
        }

        .temp-big small {
            font-size: 1.4rem;
            font-weight: 400;
            vertical-align: super;
            letter-spacing: 0;
        }

        .feels-like {
            font-size: 0.95rem;
            color: #2d4d62;
            margin-top: 6px;
            border-left: 3px solid #5b9ab3;
            padding-left: 8px;
        }

        .today-icon {
            font-size: 4.4rem;
            line-height: 1;
            filter: drop-shadow(0 6px 8px rgba(0,40,60,0.2));
        }

        .today-desc {
            text-align: right;
        }

        .today-desc .condition {
            font-size: 1.5rem;
            font-weight: 450;
            color: #17303f;
        }

        .today-desc .highlow {
            font-size: 1.1rem;
            color: #1c4355;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        /* 未来三天预报 (简洁) */
        .forecast-title {
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #316277;
            margin-bottom: 0.8rem;
            padding-left: 4px;
        }

        .days-grid {
            display: flex;
            gap: 0.9rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .day-item {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1rem 0.2rem 0.9rem 0.2rem;
            flex: 1 1 0px;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 4px 10px rgba(58, 100, 120, 0.1);
            transition: transform 0.15s;
        }

        .day-item:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.7);
        }

        .day-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f4b5e;
            margin-bottom: 6px;
        }

        .day-icon {
            font-size: 2.4rem;
            line-height: 1;
            margin: 0.2rem 0 0.2rem;
            filter: drop-shadow(2px 4px 4px rgba(0,30,30,0.15));
        }

        .day-temp {
            font-size: 1.3rem;
            font-weight: 500;
            color: #0b3342;
        }

        .day-temp small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #416f86;
        }

        .day-desc {
            font-size: 0.85rem;
            color: #2b5f76;
            margin-top: 4px;
            padding: 0 4px;
            opacity: 0.9;
        }

        /* 底部小细节 */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #3a6e88;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed rgba(70, 130, 160, 0.3);
            padding-top: 1rem;
        }

        .update-time {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .weather-stats {
            display: flex;
            gap: 12px;
        }

        .weather-stats span {
            background: rgba(255,255,240,0.5);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 500;
            color: #1c495b;
        }

        /* 响应式 */
        @media (max-width: 430px) {
            .weather-card { padding: 1.5rem; }
            .today-weather { flex-wrap: wrap; gap: 0.5rem; }
            .temp-big { font-size: 3.2rem; }
            .days-grid { gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <!-- 简单城市模块 —— 纯静态装饰 -->
        <div class="city-search">
            <div class="city-name">
                <span>🌆</span> 山海市
            </div>
            <div class="search-placeholder">
                其他城市
            </div>
        </div>

        <!-- 今日实况 (简练) -->
        <div class="today-weather">
            <div class="temp-now">
                <div class="temp-big">21<small>°C</small></div>
                <div class="feels-like">体感 19° · 微风</div>
            </div>
            <div class="today-icon">☀️</div>
            <div class="today-desc">
                <div class="condition">晴朗</div>
                <div class="highlow">↑24° ↓16°</div>
            </div>
        </div>

        <!-- 未来三天预报 (静态示例) -->
        <div class="forecast-title">📅 近三日 · 简单看</div>
        <div class="days-grid">
            <!-- 周六 -->
            <div class="day-item">
                <span class="day-name">周六</span>
                <span class="day-icon">⛅</span>
                <span class="day-temp">22<small>°C</small></span>
                <span class="day-desc">多云</span>
            </div>
            <!-- 周日 -->
            <div class="day-item">
                <span class="day-name">周日</span>
                <span class="day-icon">🌦️</span>
                <span class="day-temp">19<small>°C</small></span>
                <span class="day-desc">短时阵雨</span>
            </div>
            <!-- 周一 -->
            <div class="day-item">
                <span class="day-name">周一</span>
                <span class="day-icon">☁️</span>
                <span class="day-temp">20<small>°C</small></span>
                <span class="day-desc">阴</span>
            </div>
            <!-- 周二 (多一天也无妨，保持简短但丰富) -->
            <div class="day-item">
                <span class="day-name">周二</span>
                <span class="day-icon">⛅</span>
                <span class="day-temp">23<small>°C</small></span>
                <span class="day-desc">转晴</span>
            </div>
        </div>

        <!-- 脚注小细节：湿度 / 风速 / 更新时间 —— 增加真实感 -->
        <div class="footer-note">
            <div class="update-time">
                <span>🕒</span> 刚刚更新
            </div>
            <div class="weather-stats">
                <span>💧 68%</span>
                <span>🌬️ 12km/h</span>
            </div>
        </div>

        <!-- 极简提示：静态示意，无动态数据 (完全符合简短静态html) -->
        <div style="text-align: right; margin-top: 0.6rem; font-size: 0.7rem; color: #426f87; opacity: 0.7;">
            ~ 简单天气卡片 · 一目了然 ~
        </div>
    </div>
</body>
</html>
